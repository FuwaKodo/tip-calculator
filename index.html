<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>tip-calculator</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body style="text-align: center; background-color: lightblue;">
    <div style="display: flex; flex-direction: column; width: 50%; text-align: center; margin-left: 25%;">
        <div style="width: 100%; height: 40%; background-color: orange;">
            <h2>Tip Calculator</h2>
        </div>

        <div style="width: 100%; height: 20%; background-color: white;">
            <div style="margin-top: 5%; width: 100%;">
                <div style="width: 100%; flex-direction: row; display: flex; justify-content: space-between;">
                    <div style="margin-left: 5%;">
                        <label for="billInput">Bill:</label>
                    </div>

                    <div style="margin-right: 5%; align-items: center;">
                        <form style="height: 100%; align-items: center;" name="billPrice">
                            <input id="billInput" type="text" style="margin-top: 10%;" name="billInput">
                        </form>
                    </div>
                </div>
            </div>

            <div style="margin-top: 5%; width: 100%;">
                <div style="width: 100%; flex-direction: row; display: flex; justify-content: space-between;">
                    <div style="margin-left: 5%;">
                        <h5>Rate Service:</h5>
                    </div>

                    <div style="margin-right: 5%; align-items: center;">
                        <form style="height: 100%; margin-top: 15%;" name="selectServiceForm">
                            <select name="selectServiceInput" id="serviceCharge">
                                <optgroup label="Rate your Tip">
                                    <option value="default" disabled selected>Select Service</option>
                                    <option value="5% -Okay">5% -Okay</option>
                                    <option value="10% -Good">10% -Good</option>
                                    <option value="15% -Excellent">15% -Excellent</option>
                                </optgroup>
                            </select>
                        </form>
                    </div>
                </div>
            </div>

            <div style="margin-top: 5%; width: 100%; display: flex; justify-content: space-around; margin-bottom: 5%;">
                <form style="width: 90%;" name="calculateForm">
                    <input type="button" style="width: 100%;" onclick="calculate()" value="Calculate"
                        name="calculateButton">
                </form>
            </div>

            <div>
                <hr size="5" width="90%" color="black">
            </div>

            <div style="margin-top: 5%; width: 100%; display: flex; justify-content: space-around; margin-bottom: 5%;">
                <div
                    style="background-color: lightgray; display: flex; flex-direction: row; align-items: center; width: 90%;">
                    <h5>Tip Amount: &#160;</h5>

                    <h5 id="tipAmount">10000000</h5>
                </div>
            </div>

            <div style="margin-top: 5%; width: 100%; display: flex; justify-content: space-around; margin-bottom: 5%;">
                <div
                    style="background-color: lightgray; display: flex; flex-direction: row; align-items: center; width: 90%;">
                    <h5>Total Amount: &#160;</h5>

                    <h5 id="totalAmount">10000000</h5>
                </div>
            </div>
        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
